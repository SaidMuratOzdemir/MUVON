# Agent makine: agent binary
# Güncelleme:
#   docker compose -f docker-compose.agent.yml pull && \
#   docker compose -f docker-compose.agent.yml up -d

services:
  agent:
    image: ghcr.io/${GITHUB_REPO:?required}/agent:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      AGENT_CENTRAL_URL: ${AGENT_CENTRAL_URL:?required}
      AGENT_API_KEY: ${AGENT_API_KEY:?required}
      AGENT_LOG_ADDR: ${AGENT_LOG_ADDR:-}
      AGENT_LOG_LEVEL: ${LOG_LEVEL:-info}
      # AGENT_WAF_SOCKET: /run/sockets/muwaf.sock  # muwaf varsa uncomment
      # ── Container log shipping (dockerwatch) ─────────────────────────
      # When the docker socket is mounted below, the agent ships every
      # container's stdout/stderr to central dialog-siem over the same
      # AGENT_LOG_ADDR connection. host_id defaults to "agent:<hostname>"
      # — set AGENT_HOST_ID to override (e.g. a friendly customer name).
      # AGENT_DOCKERWATCH_ENABLED: "true"
      # AGENT_HOST_ID: "${AGENT_HOST_ID:-}"
      # AGENT_DOCKERWATCH_MANAGED_ONLY: "false"  # ship every container
    volumes:
      - tls_cache:/var/lib/app/tls
      - logship:/var/lib/agent/logship  # spool when central is unreachable
      # ── Opt-in: local docker socket (read-only) ──────────────────────
      # Required for AGENT_DOCKERWATCH_ENABLED=true; without this mount
      # the agent silently disables container log shipping. Mount RO so
      # the agent cannot start/stop containers — only ContainerLogs +
      # ContainerInspect + EventsStream succeed under RO socket.
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      # - sockets:/run/sockets  # muwaf varsa uncomment

  # ── Opsiyonel: local muWAF ────────────────────────────────────────────────
  # muwaf:
  #   image: ghcr.io/${GITHUB_REPO:?required}/muwaf:${VERSION:-latest}
  #   restart: unless-stopped
  #   volumes:
  #     - sockets:/run/sockets

volumes:
  tls_cache:
  logship:
  # sockets:
